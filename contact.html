<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문의 | 베레종 웍스</title>
    <meta
      name="description"
      content="베레종 웍스 B2B 와인 공급/수입 상담 문의 페이지입니다."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-ko">베레종 웍스</span>
        <span class="brand-en">Verasion Works</span>
      </a>
      <nav>
        <a href="about.html">회사 소개</a>
        <a href="portfolio.html">포트폴리오</a>
        <a href="contact.html" aria-current="page">문의</a>
      </nav>
    </header>

    <main class="page-main">
      <h1>B2B 상담 문의</h1>
      <p class="section-intro">
        아래 양식은 데모입니다. 실제 운영 시 Formspree, Basin 또는 Cloudflare Workers
        연동을 권장합니다.
      </p>

      <form class="contact-form" action="#" method="post">
        <label>
          업장명
          <input type="text" name="company" required />
        </label>
        <label>
          담당자 성함
          <input type="text" name="name" required />
        </label>
        <label>
          연락처 이메일
          <input type="email" name="email" required />
        </label>
        <label>
          지역
          <input type="text" name="region" placeholder="예: 서울 강남" />
        </label>
        <label>
          월 예상 물량(병)
          <input type="number" name="volume" min="1" />
        </label>
        <label>
          문의 내용
          <textarea name="message" rows="6" required></textarea>
        </label>
        <button class="btn btn-primary" type="submit">문의 보내기</button>
      </form>

      <section class="page-section compact">
        <h2>직접 연락</h2>
        <p>Email: contact@verasionworks.com</p>
        <p>Tel: +82-2-0000-0000</p>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 Verasion Works. All rights reserved.</p>
      <a href="privacy.html">개인정보처리방침</a>
    </footer>
  </body>
</html>
